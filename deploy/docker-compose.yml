services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: photoai
      POSTGRES_USER: photoai
      POSTGRES_PASSWORD: photoai_password
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photoai -d photoai"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

  server:
    build:
      context: ../server
    env_file:
      - .env.example
    environment:
      UV_PROJECT_ENVIRONMENT: /opt/photoai-venv
    volumes:
      - ../server:/app
      - ./data/photoai:/data/photoai
    ports:
      - "8080:8080"
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
